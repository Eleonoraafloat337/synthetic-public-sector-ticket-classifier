services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      MODEL_DIR: /app/output/model
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8080:8080"
    volumes:
      - ../output/model:/app/output/model
      - ../data:/app/data:ro
    depends_on:
      - mlflow

  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.22.0 &&
             mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../output/mlruns:/mlruns
