name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image
        run: docker build -f docker/Dockerfile -t ticket-classifier:${IMAGE_TAG} .
      - name: Smoke test before push
        run: |
          docker run -d --rm -p 8080:8080 --name ticket-smoke ticket-classifier:${IMAGE_TAG}
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/health && break || sleep 1; done
          curl -fsS -X POST http://127.0.0.1:8080/classify -H 'Content-Type: application/json' -d '{"text":"I cannot login to the staff portal","include_scores":true}'
          curl -fsS -X POST http://127.0.0.1:8080/classify -H 'Content-Type: application/json' -d '{"text":"Please approve this software license procurement"}'
          curl -fsS -X POST http://127.0.0.1:8080/classify -H 'Content-Type: application/json' -d '{"text":"We need CAB approval for a release change"}'
          docker stop ticket-smoke
      - name: Push image
        run: |
          az acr login --name "${ACR_LOGIN_SERVER%%.*}"
          docker tag ticket-classifier:${IMAGE_TAG} ${ACR_LOGIN_SERVER}/ticket-classifier:${IMAGE_TAG}
          docker push ${ACR_LOGIN_SERVER}/ticket-classifier:${IMAGE_TAG}
      - name: Deploy new revision
        run: >
          az containerapp update
          --name ${CONTAINER_APP_NAME}
          --resource-group ${RESOURCE_GROUP}
          --image ${ACR_LOGIN_SERVER}/ticket-classifier:${IMAGE_TAG}
      - name: Blue green traffic weights
        run: >
          az containerapp ingress traffic set
          --name ${CONTAINER_APP_NAME}
          --resource-group ${RESOURCE_GROUP}
          --revision-weight latest=100
      - name: Post deploy health check
        run: |
          FQDN=$(az containerapp show --name ${CONTAINER_APP_NAME} --resource-group ${RESOURCE_GROUP} --query properties.configuration.ingress.fqdn -o tsv)
          curl -fsS "https://${FQDN}/health"
