name: PR checks

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "data/**/*.jsonl"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/pr-checks.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=85
      - name: Validate changed JSONL files
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'data/*.jsonl' |
            xargs -r -n1 python -m ticket_classifier.data_validate
